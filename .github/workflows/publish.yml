name: Publish

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Publish rdocx-opc
        run: cargo publish -p rdocx-opc --no-verify || echo "already published"

      - name: Wait for index
        run: sleep 60

      - name: Publish rdocx-oxml
        run: cargo publish -p rdocx-oxml --no-verify || echo "already published"

      - name: Wait for index
        run: sleep 60

      - name: Publish rdocx-layout
        run: cargo publish -p rdocx-layout --no-verify || echo "already published"

      - name: Wait for index
        run: sleep 60

      - name: Publish rdocx-html
        run: cargo publish -p rdocx-html --no-verify || echo "already published"

      - name: Wait for index
        run: sleep 60

      - name: Publish rdocx-pdf
        run: cargo publish -p rdocx-pdf --no-verify || echo "already published"

      - name: Wait for index
        run: sleep 60

      - name: Publish rdocx
        run: cargo publish -p rdocx --no-verify || echo "already published"

      - name: Wait for index
        run: sleep 60

      - name: Publish rdocx-cli
        run: cargo publish -p rdocx-cli --no-verify || echo "already published"

  release:
    name: GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        run: gh release create "${{ github.ref_name }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
